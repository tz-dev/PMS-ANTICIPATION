example_schema_version: "PMS-ANTICIPATION_EXAMPLE_1.1"

example_meta:
  example_id: "example_04"
  title: "Morally High Movements That End Up Coercive"
  case_label: "The Moral Closure Slide"
  language: "en"
  format_origin: "converted_from_markdown_case"
  depends_on:
    overlay: "PMS-ANTICIPATION"
    overlay_schema_version: "PMS-ANTICIPATION_1.1"
    base_model: "PMS"
    base_schema_version: "PMS_1.3"
  status: "draft_example"
  last_updated: "2026-04-06"
  authors:
    - name: "T. Zöller"
      role: "originator"
    - name: "ChatGPT (GPT-5.4 Thinking)"
      role: "formalization_assistant"

minimal_vignette:
  scene_bound_case: >
    A movement forms around a genuine harm such as injustice, ecological
    destruction, exploitation, discrimination, corruption, or unsafe systems.
    It begins with real testimony, credible evidence, strong commitment, and a
    socially compelling moral narrative. Over time, however, the movement
    becomes less capable of sustaining distance, plural framing, and
    self-binding. Dissent is reframed as complicity, uncertainty becomes
    intolerable, and pressure is increasingly treated as morally authorized.
  immediate_structural_focus: >
    The case tracks how a movement can become coercive not because its cause is
    false or trivial, but because anticipation mutates from a discipline of
    restraint into a justification engine: “we know what will happen unless…”
    becomes a warrant for forcing others.

why_this_is_repo_useful:
  structural_focus: >
    This example is central because it demonstrates a difficult PMS claim:
    structural maturity and content correctness are not the same. A movement
    can be right about harm, morally serious in orientation, and still drift
    into coercive anticipation through operator misplacement.
  repo_relevance:
    - "Shows how Λ can be morally closed rather than merely epistemically closed."
    - "Demonstrates how Χ can be delegitimized from within a morally compelling movement."
    - "Makes visible how Ω can be reproduced from below even in movements opposing domination."
    - "Clarifies the difference between strong Coherence (C) and mature Integration (Σ)."
    - "Shows how Ψ externalization transforms responsibility language into imposed obligation."
  use_value_for_overlay: >
    The case is especially valuable because it expands PMS-ANTICIPATION beyond
    technocratic, institutional, or security contexts and shows how coercive
    drift can arise inside advocacy and moral struggle without requiring bad
    intentions or false goals.

operator_mapping:
  reduced_signature:
    primary_signature:
      label: "Moral closure drift under anticipatory load"
      operators: ["Δ", "□", "Λ", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
      note: >
        The case is dominated by real distinctions of harm (Δ), a compelling
        movement frame (□), anticipatory non-event logic about future harm (Λ),
        strong asymmetry fields (Ω), urgency and irreversibility claims (Θ),
        reframing pressure (Φ), delegitimized distance (Χ), partial or failed
        integration (Σ), and self-binding that drifts outward into obligation
        imposed on others (Ψ externalization).
    shorthand_relation_to_overlay:
      ANT_min_presence: ["Δ", "□", "Λ", "Θ", "Χ"]
      ANT_viable_requirement: ["Δ", "∇", "□", "Λ", "Α", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
      case_position: >
        The movement begins with a strong anticipatory structure because real
        harm is named, non-events matter, asymmetry is visible, and time is not
        neutral. Drift begins when Λ is morally closed, Χ loses legitimacy, Φ
        becomes semantic escalation, Σ collapses into one-axis coherence, and Ψ
        no longer binds the movement to its own restraint.

  operator_roles_in_case:
    "Δ":
      case_role: >
        Real distinctions are drawn: harms, exclusions, victims, exploitative
        structures, denial patterns, and institutional protections become
        visible and socially salient.
    "∇":
      case_role: >
        Impulse is strong: urgency, moral force, anger, solidarity, and public
        pressure energize the movement and intensify the need for structural
        discipline downstream.
    "□":
      case_role: >
        Multiple frames are present—advocacy, moral critique, institutional
        reform, in-group belonging, conflict escalation. Drift begins when one
        frame silently totalizes the rest.
    "Λ":
      case_role: >
        The decisive object is the anticipated continuation or intensification
        of harm if nothing changes. Λ is legitimate at first, but becomes
        dangerous when possibility is treated as already morally settled.
    "Α":
      case_role: >
        Repetition stabilizes slogans, enforcement habits, pressure tactics,
        call-out rituals, and loyalty tests into a durable attractor.
    "Ω":
      case_role: >
        The movement often begins by opposing domination, yet may reproduce new
        asymmetries internally through call-out authority, purity enforcement,
        crowd power, and the unequal distribution of standing.
    "Θ":
      case_role: >
        Temporality is real because harms persist and windows for change may
        close. Drift begins when Θ is converted from pressure for disciplined
        restraint into permission for irreversible pressure.
    "Φ":
      case_role: >
        Recontextualization is initially healthy and adaptive, but later may
        transform disagreement into harm, restraint into betrayal, and
        procedural limits into oppression.
    "Χ":
      case_role: >
        Distance is the crucial safety operator. When it is reframed as
        complicity or neutrality-as-guilt, the movement loses its internal brake.
    "Σ":
      case_role: >
        Integration should hold plural goods, trade-offs, tactics, and dignity
        constraints together. Drift occurs when high coherence is mistaken for
        full integration.
    "Ψ":
      case_role: >
        Self-binding should apply first to the movement’s own conduct, criteria,
        and handling of consequence. Coercive drift begins when Ψ is
        externalized into “everyone else must comply.”

typical_drift_markers:
  max_expected: "2_to_3_preferred_in_short_form"
  selected_markers:
    - marker: "There’s no neutral position."
      structural_reading: "Χ delegitimized"
    - marker: "If you question this, you’re harmful."
      structural_reading: "Φ escalator plus Ω enforcement"
    - marker: "Everyone must comply."
      structural_reading: "Ψ externalized"
  extended_marker_set:
    - marker: "It’s clear now."
      structural_reading: "Λ closure"
    - marker: "We don’t owe you explanations."
      structural_reading: "D erosion under Ω"
    - marker: "Pressure is the only language they understand."
      structural_reading: "E as dominance instrument"
    - marker: "Dissent proves corruption."
      structural_reading: "□ totalization"

validity_gate_reminder:
  chi_distance: >
    PMS-valid application requires that Χ remain a legitimate structural brake.
    In this case, drift is defined by the rhetorical moment in which distance is
    treated as guilt, betrayal, or complicity.
  reversibility: >
    Reversibility requires that movement tactics and interpretations remain
    revisable and scene-bound rather than escalating into irreversible purity,
    exclusion, or coercive obligation.
  dignity_in_practice: >
    D requires that opponents, bystanders, dissenters, and internal critics are
    not stripped of standing as a tactic, even under real asymmetry and real harm.
  application_warning: >
    Once the movement authorizes pressure by morally closing Λ, delegitimizing
    Χ, reproducing Ω internally, and externalizing Ψ, it no longer operates as
    PMS-valid anticipation even if its cause remains substantively serious.

readable_structural_closure:
  short_closure: >
    This case shows how a morally serious movement can become coercive without
    needing bad intentions or false goals. The decisive slide occurs when
    anticipated harm stops being carried as structurally open, distance becomes
    morally suspect, and responsibility turns into obligation imposed on others.
    PMS-ANTICIPATION makes visible that the tipping point is not content error
    but operator drift: Λ closes, Χ is delegitimized, Ω reproduces internally,
    and Ψ externalizes.

extended_scene_analysis:
  identity_and_purpose:
    purpose: >
      Show how a movement with high awareness, real harms, and compelling moral
      reasons can still become structurally coercive because anticipation turns
      into moral weaponry.
    scope: >
      Praxeological scenes, roles, slogans-as-operators, and escalation
      pathways; not person-judgments, diagnoses, or good/bad people narratives.
    pms_entry_condition_reminder: >
      PMS-valid application presupposes Χ, reversibility, and D. This case is
      defined by the moment these constraints are rhetorically denied in the
      name of the cause.

  frame_validity_check:
    operator: "□"
    what_is_the_frame:
      frame_layers:
        - "advocacy frame"
        - "moral frame"
        - "institutional frame"
        - "in-group identity frame"
        - "conflict frame"
      legitimate_objects_in_scope:
        - "public persuasion"
        - "coalition-building"
        - "harm articulation"
        - "institutional pressure"
        - "movement self-discipline"
      out_of_scope:
        - "treating one frame as globally exhaustive"
        - "converting frame difference into moral defect by default"
        - "using total frame ownership as structural proof"
    frame_boundary_requirement: >
      A PMS-valid reading must ask which frame currently drives operator
      placement. Coercion often appears when the conflict frame silently takes
      over while the movement still speaks in the language of advocacy or care.
    frame_failure_signal: >
      When the movement treats its frame as the only legitimate lens, □ becomes
      totalizing and disagreement is recoded as defect rather than as
      frame-difference or contested placement.

  non_event_integrity:
    operator: "Λ"
    decisive_object:
      - "if nothing changes, harm persists"
      - "if reform fails, disaster follows"
      - "if they remain in power, we are doomed"
      - "if society does not awaken, the point of no return arrives"
    structural_observation: >
      Λ is legitimate because future harm and continued injustice are real
      objects of anticipation. The central risk is not naming them, but morally
      closing them.
    central_risk: >
      Possibility becomes inevitability, warning becomes certainty, and scenario
      becomes moral fact. Once Λ is treated as already decided, keeping it open
      begins to look like siding with harm.
    diagnosis: >
      This is not merely epistemic closure but moral closure: the future is
      treated as already normatively settled in a way that authorizes pressure.
    overlay_constraint: >
      PMS-ANTICIPATION remains viable only if Λ is carried under Θ as open,
      consequential, and serious, without being transformed into an
      authorization token.

  asymmetry_audit:
    operator: "Ω"
    where_asymmetry_concentrates:
      initial_asymmetry:
        - "victims or exposed groups versus protected groups"
        - "institutionally weak versus institutionally secure"
        - "those naming harm versus those denying or minimizing it"
      reproduced_internal_asymmetry:
        - "call-out power over deliberative voice"
        - "purity enforcers over bridge-builders"
        - "crowd authority over individual standing"
        - "moral entrepreneurs over ordinary members"
    self_legitimating_gradient: >
      Movements often begin by resisting domination, but success-by-pressure can
      produce a new asymmetry in which efficacy is interpreted as entitlement.
      Bottom-up enforcement becomes structurally self-validating.
    pms_valid_requirement: >
      Rising Ω requires stronger dignity discipline, not stronger entitlement.
      If asymmetry becomes a moral license, the movement reproduces what it
      claims to oppose.

  temporality_and_trajectory:
    operator: "Θ"
    temporal_pressure_patterns:
      - "there is no time to deliberate"
      - "hesitation enables harm"
      - "we must force compliance now"
    trajectory_lock_in:
      - "decisions become identity tests"
      - "exits feel like treason"
      - "cooling down feels immoral"
      - "escalation becomes the proof of seriousness"
    structural_point: >
      Θ is real because harms persist, but PMS treats that as reason to keep
      restraint active. Drift begins when time pressure is turned into a
      permission slip for irreversible pressure.

  recontextualization_dynamics:
    operator: "Φ"
    key_shift: >
      Ordinary plurality and disagreement are recontextualized into moral
      emergency: critique becomes violence, uncertainty becomes bad faith,
      restraint becomes cowardice, and procedural limits become oppression.
    moralization_vector:
      - "disagreement becomes harm"
      - "critique becomes complicity"
      - "uncertainty becomes corruption"
      - "restraint becomes betrayal"
    phi_failure_signal: >
      Φ becomes a semantic escalator when reinterpretation no longer preserves
      openness, but continuously upgrades ordinary friction into justificatory emergency.

  distance_enforcement:
    operator: "Χ"
    why_distance_is_hard_here: >
      Because the movement is morally serious and the harms are real, keeping Χ
      active feels costly. Distance may be mistaken for weakness, disloyalty, or
      hidden alignment with the harmful side.
    erosion_pattern:
      - "neutrality is complicity"
      - "restraint protects oppression"
      - "there is no legitimate hesitation"
    pms_valid_requirements:
      - "Χ must remain structurally legitimate even under urgency"
      - "distance must not be recoded as guilt by default"
      - "keeping Λ open must remain possible without immediate moral suspicion"
      - "pressure must not replace structural braking"
    diagnosis: >
      The key tipping point is not simply anger or advocacy intensity, but the
      delegitimization of distance itself. Once Χ is removed, anticipation no
      longer disciplines the movement; it serves it as a weapon.

  integration_quality:
    operator: "Σ"
    what_must_be_integrated:
      - "plural strategies"
      - "conflicting goods"
      - "trade-offs under temporality"
      - "capacity limits"
      - "dignity constraints under asymmetry"
      - "internal disagreement without immediate moral downgrade"
    sigma_failure_modes:
      - "coherence mistaken for integration"
      - "single-axis moral ordering"
      - "rapid outrage coordination without ambiguity tolerance"
    structural_effect: >
      The movement can become highly coherent and socially contagious without
      becoming integrative. High C is not equivalent to mature Σ.

  self_binding_test:
    operator: "Ψ"
    decisive_question: "Who is actually bound by the anticipatory stance?"
    pms_requirement: >
      Ψ must bind the movement first: to its own standards, to its own handling
      of consequence, to its own use of power, and to its own restraint under Ω.
    core_drift:
      from: "We bind ourselves to disciplined consequence-handling."
      to: "Everyone else must comply, or they are morally implicated."
    verdict_condition: >
      Once responsibility language primarily imposes obligation outward, the
      movement is no longer deepening self-binding but externalizing it.

  derived_axes_projection:
    note: "Structural reading only; not person evaluation."
    axes:
      A:
        movement: "high"
        reason: "many harms, distinctions, and signals are made visible"
      C:
        movement: "high and contagious"
        reason: "the narrative becomes socially stable and rhetorically compelling"
      R:
        movement: "initially strong, then outward-shifting"
        reason: "responsibility drifts from self-discipline toward imposed obligation"
      E:
        movement: "high or rapidly increasing"
        reason: "social enforcement and movement action intensify quickly"
      D:
        movement: "critical stress point"
        reason: >
          dignity collapses first where pressure is legitimized through moral closure
          and asymmetry is operationalized against dissenters or outsiders
    hazard_signature: >
      High A, high C, high E, but suppressed Χ and eroding D under reproduced Ω
      indicate a coercive moral closure slide.

  core_mechanism:
    label: "Coercion without bad intentions"
    operator_chain:
      - "Δ and □ mark real harm inside a compelling moral frame."
      - "Λ becomes central as anticipated continuation of harm."
      - "Under Θ and Ω, urgency and exposure become socially intense."
      - "Λ is morally closed so uncertainty becomes illegitimate."
      - "Χ is delegitimized so restraint becomes suspect."
      - "Ψ externalizes so obligation is displaced outward."
      - "Ω reproduces internally through enforcement roles and status gradients."
      - "Α stabilizes the pattern: success-by-pressure becomes a recurrent attractor."
    paradox_statement: >
      The movement may become more coercive precisely while believing it is
      becoming more responsible.
    interpretation: >
      This is not a flip into evil or a revelation that the cause was false. It
      is a structural mutation in which brakes are reinterpreted as defects and
      pressure becomes self-justifying.

  viability_criteria:
    note: "Non-prognostic viability criteria for the case."
    criteria:
      - id: "lambda_integrity"
        meaning: "Future harm remains structurally open and serious, not morally settled as certainty."
      - id: "chi_protected"
        meaning: "Distance remains a legitimate safety operator rather than a sign of guilt."
      - id: "psi_internal"
        meaning: "Binding applies first to the movement’s own conduct, criteria, and consequence-handling."
      - id: "omega_discipline"
        meaning: "Asymmetry is not used as entitlement; vulnerability increases restraint obligations."
      - id: "d_preserved"
        meaning: "Opponents, bystanders, and dissenters are not stripped of standing as tactic."
      - id: "reversibility_maintained"
        meaning: "Escalation is not made irreversible merely to preserve credibility."
    failure_interpretation: >
      If these fail, the movement may remain morally intense and politically
      effective, but no longer counts as PMS-valid anticipatory praxis within
      overlay criteria.

  output_boundary:
    pms_compatible_outputs:
      - "structural mapping of the coercion pathway without judging the truth of the cause"
      - "identification of Λ-closure events in rhetoric, policy, or escalation scenes"
      - "analysis of Χ delegitimization mechanisms"
      - "tracing Ω reproduction from below through roles, incentives, and status gradients"
      - "diagnosis of Ψ externalization versus self-binding"
      - "D-viability audit under conflict and urgency"
    pms_invalid_outputs:
      - "action mandates of the form 'therefore you must...'"
      - "moral ranking of persons or groups"
      - "coercion optimization or pressure-improvement tactics"
      - "guidance on how to pressure more effectively"

  minimal_map_walkthrough:
    step_1_frame: "Which frame dominates right now: advocacy, conflict, identity, or institutional?"
    step_2_non_event: "Where did possible harm become settled certainty?"
    step_3_asymmetry: "Where is enforcement power accumulating inside the movement?"
    step_4_distance: "Where is restraint being treated as guilt or betrayal?"
    step_5_self_binding: "Is the movement bound to standards, or are others bound to compliance?"
    closure_rule: >
      When the answers shift toward outsiders must comply and restraint is
      immoral, the coercive tipping point is active.

assistant_test_vectors:
  promptable_probes:
    - "Model a movement where Λ becomes morally closed and Χ gets delegitimized. Identify the tipping point sentence."
    - "Describe Ω reproduction from below: how enforcement roles emerge without formal authority."
    - "Show how Ψ externalization transforms responsibility language into coercion."
    - "Distinguish high Coherence (C) from mature Integration (Σ) in moral movements."
    - "Project this configuration onto A/C/R/E/D and locate where D collapses first."

schema_conformity_check:
  required_blocks_present:
    - "Minimal vignette (scene-bound)"
    - "Why this is repo-useful (structural focus)"
    - "Operator mapping (reduced signature)"
    - "Typical drift markers (max 2–3; non-moral)"
    - "Validity gate reminder (Χ + reversibility + D)"
    - "Readable structural closure (2–5 sentences; non-instructional)"
  conformity_note: >
    This example is scene-bound, operator-readable, non-diagnostic,
    non-instructional, and fully aligned with PMS-ANTICIPATION application constraints.