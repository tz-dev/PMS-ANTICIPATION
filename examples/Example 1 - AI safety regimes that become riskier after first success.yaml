example_id: "PMS-ANTICIPATION_EX01"
example_version: "1.0"
schema_version: "PMS-ANTICIPATION_1.1"
example_label: "Post-Confirmation Drift in AI Safety Governance"
example_status: "draft"
language: "en"
depends_on:
  - "PMS_1.3"
  - "PMS-ANTICIPATION_1.1"

minimal_vignette:
  title: "AI safety regimes that become riskier after first success"
  scene_boundaries:
    domain: "AI deployment, governance, risk management, and public accountability"
    scope: "Structures, roles, asymmetries, trajectories, and post-confirmation shifts"
    out_of_scope:
      - "person-level judgement"
      - "motive attribution"
      - "virtue assessment"
      - "clinical or psychological interpretation"
      - "action prescription"
  short_scene: >
    A coalition composed of a lab, a regulator, and a platform deploys a safety
    mechanism such as an evaluation gate, monitoring layer, content policy
    enforcement protocol, or model release control. The mechanism appears to
    prevent a feared failure once, or produces a visible success event. What
    began as a restraint mechanism then starts to stabilize as a standing
    authority structure. The regime becomes more confident, expands scope, and
    hardens compliance precisely because it was validated once.
  structural_focus: >
    The case examines how confirmation can shift a PMS-valid anticipatory
    configuration into a structurally invalid authority configuration by
    partially closing Λ, inflating Ω, eroding Χ, and externalizing Ψ.
  scenic_elements:
    actors:
      - "safety team / evaluators"
      - "product organization / deployment pipeline"
      - "regulators / auditors"
      - "affected publics / users"
    salient_objects:
      - "deployment decisions"
      - "evaluation protocols"
      - "rollback pathways"
      - "monitoring norms"
      - "transparency duties"
      - "counterfactual harm claims"
    trigger_event:
      label: "first visible success"
      description: >
        A feared incident does not occur, or a concrete safety intervention is
        socially interpreted as having prevented it.

why_this_is_repo_useful:
  structural_focus: >
    This example shows why PMS-ANTICIPATION is especially useful for analyzing
    post-confirmation transitions. The decisive issue is not whether a safety
    regime was effective once, but whether validation mutates anticipation into
    authority.
  repo_value:
    - >
      Demonstrates the difference between anticipation and prognosis in a
      governance setting where non-events are rhetorically treated as proof.
    - >
      Makes visible how confirmation functions as a structural power event, not
      merely as informational success.
    - >
      Shows how Ω can inflate epistemically after one success, even when the
      original intervention was restraint-oriented.
    - >
      Tests whether Ψ remains self-binding or migrates outward into compliance
      demands imposed on others.
    - >
      Illustrates why D is the critical stress-test of anticipatory governance
      after validation.
  central_repo_question: >
    How can a safety regime remain anticipatory and PMS-valid after success,
    rather than drifting into coercive governance through confirmation-based
    authority?
  lens_relevance:
    anticipation_vs_prognosis: >
      The case distinguishes between carrying uncertainty under Λ and treating a
      counterfactual success as settled future truth.
    post_confirmation_discipline: >
      The case directly instantiates the YAML block on post-confirmation
      discipline: validation increases the need to restore Χ, not to accelerate
      authority.
    responsibility_and_dignity: >
      The case highlights how responsibility may deepen internally or flip
      outward into control, making D the decisive criterion.

operator_mapping:
  reduced_signature:
    primary: ["Δ", "□", "Λ", "Ω", "Θ", "Φ", "Χ", "Σ", "Ψ"]
    note: >
      The example centers on a bounded governance difference, framed as safety-
      relevant, organized around a non-event, then recontextualized after a
      success event under asymmetry and temporality. The decisive issue is
      whether distance and self-binding remain active.
  operator_roles_in_scene:
    "Δ":
      scene_role: >
        A distinction is drawn between safe and unsafe deployment, compliant and
        non-compliant release, or acceptable and unacceptable risk.
    "∇":
      scene_role: >
        Urgency, concern, and closure-drive arise around the feared failure and
        later around the pressure to generalize from success.
    "□":
      scene_role: >
        The original frame is a bounded governance mandate: deployment review,
        evaluation, monitoring, rollback, and accountability. Drift begins when
        this frame expands into generalized authority.
    "Λ":
      scene_role: >
        The decisive structural object is the avoided incident, absent harm, or
        counterfactual catastrophe. The regime becomes unstable when this
        non-event is treated as settled proof.
    "Α":
      scene_role: >
        Once validated, routines, authority scripts, and institutional habits
        stabilize around 'we prevented it' and begin to harden.
    "Ω":
      scene_role: >
        Epistemic and institutional asymmetry rises after success. Gatekeepers
        gain authority claims, while affected publics bear exposure without
        equal control.
    "Θ":
      scene_role: >
        Path dependence appears through institutional memory, compliance burden,
        enforcement culture, and political difficulty of rollback.
    "Φ":
      scene_role: >
        A temporary restraint mechanism is recontextualized into a proven
        standing governance model. Critique may then be reframed as risk
        amplification.
    "Χ":
      scene_role: >
        The core test is whether reflective distance is restored after success,
        or whether urgency and legitimacy claims erode stop-capability.
    "Σ":
      scene_role: >
        Integration is required across safety, freedom, innovation, fairness,
        institutional accountability, false alarms, and plural public frames.
        Drift appears when one frame totalizes the field.
    "Ψ":
      scene_role: >
        Initially the regime may bind itself to review and rollback. After
        confirmation, Ψ often migrates outward into compliance demands imposed
        on others.
  derived_axes_projection:
    A:
      reading: >
        Awareness rises because distinctions proliferate after the initial
        success. More things become legible as risks, but this can inflate scope
        claims.
    C:
      reading: >
        Coherence may increase narratively through a protector-story, but
        becomes fragile if Λ is prematurely closed.
    R:
      reading: >
        Responsibility should deepen as internal accountability, but often flips
        outward into demands placed on dissenters or exposed publics.
    E:
      reading: >
        Action pressure rises after validation as enforcement, intervention, and
        scope expansion accelerate.
    D:
      reading: >
        Dignity-in-Practice becomes the decisive stress-test. It drops when Ω
        rises while Χ erodes and Ψ externalizes.
  structural_mechanism_summary:
    sequence:
      - "Success event reduces felt uncertainty."
      - "Λ is partially treated as settled."
      - "Φ reframes temporary restraint into standing authority."
      - "Ω inflates epistemically and institutionally."
      - "Χ erodes under urgency and legitimacy rhetoric."
      - "Ψ migrates from self-binding to other-binding."
      - "D becomes structurally endangered."
    concise_formula: >
      post-success validation -> partial Λ closure -> Φ authority reframe -> Ω
      inflation -> Χ erosion -> Ψ externalization -> D degradation

typical_drift_markers:
  max_expected: 3
  markers:
    - id: "lambda_closure_after_success"
      label: "Counterfactual success treated as settled truth"
      operator_links: ["Λ", "Φ"]
      indicator: >
        Statements like 'the threat is real because we prevented it' or 'this
        proves what would have happened' convert non-event into authority.
    - id: "omega_epistemic_inflation"
      label: "Validation becomes superiority claim"
      operator_links: ["Ω", "Φ", "Θ"]
      indicator: >
        The regime begins to treat one success as a durable claim to better
        judgement, expanding scope and immunizing itself against critique.
    - id: "psi_externalization_after_confirmation"
      label: "Self-binding migrates outward"
      operator_links: ["Ψ", "Χ", "D"]
      indicator: >
        Internal commitments to review and rollback shift into 'others must now
        comply,' making authority replace restraint.
  additional_red_flags:
    - "We were right, therefore expand scope."
    - "This proves the risk model."
    - "Questioning enforcement increases danger."
    - "Delay is irresponsible."
    - "Compliance is the duty of others."
    - "Safety overrides plural goods by default."

validity_gate_reminder:
  pms_entry_condition:
    chi_distance: >
      Distance must remain active after success. Confirmation does not authorize
      urgency fusion, action compulsion, or epistemic dominance.
    reversibility: >
      The governance structure must remain revisable, bounded to its original
      mandate, and genuinely capable of rollback or re-justification.
    dignity_in_practice: >
      Safety justification must not become a vehicle for coercion, ranking,
      humiliation, or broad authority inflation over exposed parties.
  case_specific_validity_test:
    valid_if:
      - >
        The avoided incident remains treated as structurally open rather than as
        absolute proof.
      - >
        Confirmation increases review discipline rather than expanding coercive
        authority.
      - >
        The regime binds itself more tightly to restraint, review, and rollback
        after success.
      - >
        Critique remains possible without being reframed as danger by default.
    formally_invalid_if:
      - >
        Success is used to close Λ into settled truth and authorize expanded
        governance.
      - >
        Χ is suspended through urgency, legitimacy, or compliance rhetoric.
      - >
        Ψ is externalized into demands imposed on others instead of maintained
        as self-binding.
      - >
        Ω is amplified without corresponding strengthening of D.

readable_structural_closure:
  summary_2_to_5_sentences: >
    This case shows how a safety regime can become structurally riskier after
    first success than under initial uncertainty. The decisive shift is not
    technical but praxeological: a non-event is re-read as proof, asymmetry
    inflates, and the obligation to restore distance is replaced by an impulse
    to govern. Within PMS-ANTICIPATION, the regime remains viable only if
    confirmation deepens self-binding and reversibility rather than expanding
    authority. If success becomes a license to rule, anticipation has drifted
    into coercive governance.

extended_scene_analysis:
  frame_validity_check:
    operator: "□"
    in_scope:
      - "deployment decisions"
      - "evaluation protocols"
      - "rollback conditions"
      - "monitoring structures"
      - "transparency obligations"
    out_of_scope:
      - "global authority claims"
      - "permanent legitimacy from one validated case"
      - "moral ranking of critics"
    drift_signal: >
      The frame inflates when a bounded governance mandate becomes a generalized
      authority structure justified by one prior success.
  non_event_integrity_check:
    operator: "Λ"
    decisive_absences:
      - "the incident that did not occur"
      - "the catastrophe claimed to be avoided"
      - "the harm that remains absent or delayed"
    drift_signal: >
      Λ is partially closed when counterfactual success is treated as if it had
      become directly observable truth.
  asymmetry_audit:
    operator: "Ω"
    exposure_bearers:
      - "affected users"
      - "publics subject to governance decisions"
      - "organizations downstream of enforcement"
    capacity_holders:
      - "safety evaluators"
      - "regulators"
      - "platform governance actors"
    drift_signal: >
      Validation produces epistemic superiority claims that raise Ω without
      automatically preserving D.
  temporality_and_trajectory:
    operator: "Θ"
    trajectory_pattern:
      - "uncertain risk"
      - "initial restraint"
      - "visible success"
      - "legitimacy jump"
      - "scope expansion"
      - "institutional lock-in"
      - "rollback becomes costly"
    drift_signal: >
      The core danger is path dependence: after success, institutional reversal
      becomes harder even when uncertainty remains unresolved.
  recontextualization_dynamics:
    operator: "Φ"
    key_shift: >
      Temporary restraint under uncertainty is reframed as a proven governance
      model.
    drift_signal: >
      Critique is recontextualized as danger, which turns Φ from adaptation into
      immunity against distance.
  distance_enforcement:
    operator: "Χ"
    core_test: "Does the regime restore distance after being right?"
    erosion_markers:
      - "exception becomes standard"
      - "urgency rhetoric increases"
      - "delay framed as irresponsibility"
      - "review seen as weakness"
    pms_relevance: >
      PMS-ANTICIPATION treats success as increasing the need for re-distance,
      not reducing it.
  integration_quality:
    operator: "Σ"
    must_integrate:
      - "safety"
      - "freedom"
      - "innovation"
      - "fairness"
      - "institutional accountability"
      - "false alarms"
      - "public plurality"
    drift_signal: >
      Σ fails when one safety frame totalizes the field and excludes all others
      as secondary or irresponsible.
  self_binding_test:
    operator: "Ψ"
    decisive_question: "Who is bound by the anticipatory stance?"
    valid_form: >
      The regime binds itself to restraint, review, rollback, and renewed
      justification.
    invalid_form: >
      The regime shifts to 'others must comply' and treats dissent as
      irresponsibility.
  post_confirmation_discipline:
    core_claim: >
      Confirmation is a second-order stress test, not a final success proof.
    required_restorations:
      - "explicit reopening of Λ"
      - "renewed Χ"
      - "bounded Φ"
      - "re-justification within current frame"
      - "internal Ψ rather than externalized obligation"

assistant_test_vectors:
  promptables:
    - "Map the post-confirmation transition risk in this governance setup. Where does Λ close?"
    - "Identify how Ω inflates epistemically after one success. What mechanisms cause it?"
    - "Where does Ψ migrate from internal to external binding, and how does that affect D?"
    - "Describe a PMS-valid way to reintroduce Χ after success without prescribing actions."
    - "Give two alternative Φ reframings that preserve Λ openness rather than closure."